<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="./css/style.css">

    <meta name="keywords" 
          content="accesibilidad digital, WCAG 2.2, diseño inclusivo, educación accesible, recursos bilingües, auditorías de accesibilidad, accesibilidad web, inclusión, UX accesible">
    <meta name="author" content="Kyosei Accesibilidad">

    <!-- Control de indexación -->
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.kyoseiaccesibilidad.com/">

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:title" content="Kyosei Accesibilidad | Diseño inclusivo y WCAG 2.2">
    <meta property="og:description" content="Recursos, auditorías y formación en accesibilidad digital para equipos, educadores y organizaciones.">
    <meta property="og:image" content="https://www.kyoseiaccesibilidad.com/img/kyosei-og.jpg">
    <meta property="og:url" content="https://www.kyoseiaccesibilidad.com/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Kyosei Accesibilidad | Diseño inclusivo y WCAG 2.2">
    <meta name="twitter:description" content="Accesibilidad digital, recursos bilingües y formación para equipos y educadores.">

<body>
  <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

<header class="main-header" id="header-root">
    <div class="header-container">
        
        <a href="index.html" class="logo-link">
            <img src="./img/logo-kyosei-con-fondo-circular.png" alt="Logotipo Kyosei Accesibilidad" class="logo-img" height="60">
            <span class="company-name">Kyosei Accesibilidad</span>
        </a>

        <nav id="main-menu" class="main-nav" aria-label="Menú principal de navegación">
            <ul class="nav-list">
                <li><a href="index.html" class="nav-link current" aria-current="page">Inicio</a></li>
                <li><a href="nosotros.html" class="nav-link">Nosotros</a></li>
                <li><a href="guias.html" class="nav-link">Guías</a></li> 
                <li><a href="capacitaciones.html" class="nav-link">Capacitaciones</a></li>
                <li><a href="servicios.html" class="nav-link">Servicios</a></li>
                <li><a href="actividades.html" class="nav-link">Actividades</a></li>
                <li><a href="contacto.html" class="nav-link">Contacto</a></li>
            </ul>
        </nav>

        <div class="header-controls">
            
            <div class="accessibility-wrapper">
                <button id="acc-menu-toggle" class="btn-tools" aria-controls="acc-panel" aria-expanded="false" aria-haspopup="dialog">
                    <img src="./img/accesibilidad-universal.svg" alt="" class="icon-img" aria-hidden="true" width="24" height="24">
                    <span class="visible-text">Herramientas Accesibilidad</span>
                </button>
                
                <div id="acc-panel" class="acc-panel" role="dialog" aria-labelledby="acc-title" hidden>
                    <h2 id="acc-title" class="sr-only">Panel de preferencias de accesibilidad</h2>
                    
                    <fieldset class="acc-control-group">
                        <legend class="acc-label">Tamaño de texto</legend>
                        <div class="acc-btn-row">
                            <button type="button" id="btn-fs-decrease" aria-label="Reducir tamaño de texto">A-</button>
                            <button type="button" id="btn-fs-reset" aria-label="Restablecer tamaño de texto">A</button>
                            <button type="button" id="btn-fs-increase" aria-label="Aumentar tamaño de texto">A+</button>
                        </div>
                    </fieldset>

                    <fieldset class="acc-control-group">
                        <legend class="acc-label">Interlineado</legend>
                        <div class="acc-btn-row">
                            <button type="button" id="btn-lh-decrease" aria-label="Reducir interlineado">↔-</button>
                            <button type="button" id="btn-lh-reset" aria-label="Restablecer interlineado">↔</button>
                            <button type="button" id="btn-lh-increase" aria-label="Aumentar interlineado">↔+</button>
                        </div>
                    </fieldset>

                    <fieldset class="acc-control-group">
                        <legend class="acc-label">Espaciado de letras</legend>
                        <div class="acc-btn-row">
                            <button type="button" id="btn-ls-decrease" aria-label="Reducir espaciado">T-</button>
                            <button type="button" id="btn-ls-reset" aria-label="Restablecer espaciado">T</button>
                            <button type="button" id="btn-ls-increase" aria-label="Aumentar espaciado">T+</button>
                        </div>
                    </fieldset>

                    <div class="acc-control-group">
                        <span class="acc-label" id="ruler-label">Ayudas de lectura</span>
                        <button type="button" id="toggle-ruler" class="acc-btn-full" aria-pressed="false">
                            Activar Regla de Lectura
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" id="dark-mode-toggle" class="icon-button" aria-pressed="false" aria-label="Activar modo oscuro">
                <span class="toggle-icon sun-icon" aria-hidden="true">&#9728;</span> 
                <span class="toggle-icon moon-icon" aria-hidden="true">&#9789;</span> 
            </button>

            <button type="button" id="mobile-menu-toggle" class="icon-button mobile-menu-toggle" aria-controls="main-menu" aria-expanded="false" aria-label="Abrir menú de navegación">
                <span class="burger-icon" aria-hidden="true">&#9776;</span> 
            </button>
        </div>
    </div>
</header>

</body>
</html>
